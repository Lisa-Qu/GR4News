name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            torch==2.2.2+cpu \
            -r mind_genrec/requirements.txt

      - name: Run tests
        run: pytest mind_genrec/tests/ -v --tb=short
