project_name: mind_genrec
dataset_name: MIND-large

data:
  news_path: data/mind_large/news.jsonl
  behaviors_path: data/mind_large/behaviors.jsonl
  max_history_length: 50

semantic_id:
  encoder_type: hashing
  code_length: 4
  codebook_size: 256
  embedding_dim: 256
  max_iterations: 25
  sample_size: 50000
  batch_size: 4096

model:
  decoder_type: lazy_ar
  lazy_parallel_layers: 2
  hidden_dim: 256
  num_layers: 4
  num_heads: 8
  dropout: 0.1

training:
  batch_size: 128
  learning_rate: 0.001
  epochs: 3

baseline:
  hidden_dim: 256
  output_dim: 128
  num_heads: 8
  num_layers: 2
  dropout: 0.1
  temperature: 0.07
  batch_size: 256
  learning_rate: 0.001
  epochs: 3

evaluation:
  mode: full_corpus_retrieval
  validation_ratio: 0.5
  top_ks: [5, 10]
  batch_size: 128

serving:
  host: 0.0.0.0
  port: 8000
  default_top_k: 10
  cache_ttl_seconds: 600
