project_name: mind_genrec
dataset_name: MIND-small

data:
  news_path: data/mind_small/news.jsonl
  behaviors_path: data/mind_small/behaviors.jsonl
  max_history_length: 50

semantic_id:
  encoder_type: sbert
  sbert_model_name: "BAAI/bge-small-en-v1.5"
  sbert_batch_size: 256
  quantizer_type: rqvae  # "kmeans" or "rqvae"
  code_length: 4
  codebook_size: 256
  embedding_dim: 384  # bge-small output dim
  max_iterations: 20  # kmeans only
  sample_size: 20000  # kmeans only
  batch_size: 2048
  rqvae_epochs: 50
  rqvae_commitment_weight: 0.25
  rqvae_learning_rate: 0.001

model:
  decoder_type: ar
  lazy_parallel_layers: 2
  hidden_dim: 512
  num_layers: 6
  num_heads: 8
  dropout: 0.1

training:
  batch_size: 64
  learning_rate: 0.001
  warmup_steps: 500
  epochs: 100
  eval_every: 5
  patience: 2

baseline:
  hidden_dim: 512
  output_dim: 256
  num_heads: 8
  num_layers: 4
  dropout: 0.1
  temperature: 0.07
  batch_size: 128
  learning_rate: 0.001
  warmup_steps: 500
  epochs: 100
  eval_every: 5
  patience: 2

evaluation:
  mode: full_corpus_retrieval
  validation_ratio: 0.5
  top_ks: [5, 10]
  batch_size: 64

serving:
  host: 0.0.0.0
  port: 8000
  default_top_k: 10
  cache_ttl_seconds: 600

tracking:
  use_mlflow: true
  tracking_uri: "http://localhost:5000"
  experiment_name: "mind_genrec"
